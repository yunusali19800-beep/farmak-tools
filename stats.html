<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Статистика · Farmak Tools</title>
<style>
  :root{--navy:#1A2E5A;--mute:#6B7280;--line:#E5E8F0;--bg:#F4F6FB}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Inter,sans-serif;background:var(--bg);color:#1F2A44;padding:20px}
  .wrap{max-width:820px;margin:0 auto}
  h1{font-size:20px;margin:0 0 16px}
  .gate{display:flex;gap:8px;margin-bottom:20px}
  input{flex:1;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px}
  button{padding:11px 18px;border:none;border-radius:10px;background:var(--navy);color:#fff;font-weight:600;cursor:pointer}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px}
  .card h3{margin:0 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:.4px;color:var(--mute)}
  .row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:14px}
  .row:last-child{border-bottom:none}
  .big{font-size:32px;font-weight:800}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .flag{background:#FFF3E0;border:1px solid #FFD8A8;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px}
  .flag b{color:#B8351C}
  .muted{color:var(--mute);font-size:12.5px}
  #err{color:#B8351C;font-size:13px;margin-top:8px}
  pre{white-space:pre-wrap;font-size:11.5px;background:#F8F9FC;padding:10px;border-radius:8px;max-height:280px;overflow:auto}
</style>
</head>
<body>
<div class="wrap">
  <h1>Статистика сканов QR</h1>
  <div class="gate">
    <input id="key" type="password" placeholder="Ключ доступа">
    <button onclick="load()">Показать</button>
  </div>
  <div id="err"></div>
  <div id="out"></div>
</div>
<script>
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function fmtTime(ts){return new Date(ts).toLocaleString('ru-RU');}

async function load(){
  const key = document.getElementById('key').value.trim();
  if(!key){ return; }
  localStorage.setItem('farmak_stats_key', key);
  document.getElementById('err').textContent = '';
  document.getElementById('out').innerHTML = 'Загрузка…';
  try{
    const res = await fetch('/.netlify/functions/get-stats?key=' + encodeURIComponent(key));
    if(res.status === 401){
      document.getElementById('out').innerHTML='';
      document.getElementById('err').textContent = 'Неверный ключ.';
      return;
    }
    const d = await res.json();
    render(d);
  }catch(e){
    document.getElementById('err').textContent = 'Ошибка загрузки: ' + e;
  }
}

function render(d){
  const rows = (obj) => Object.entries(obj).sort((a,b)=>b[1]-a[1])
    .map(([k,v])=>`<div class="row"><span>${esc(k)||'—'}</span><b>${v}</b></div>`).join('');

  let flagsHtml = '';
  if(d.flags && d.flags.length){
    flagsHtml = d.flags.map(f=>`<div class="flag"><b>${f.type==='multi_src_rapid'?'Быстрый мультискан':'Повторный самоскан'}</b> · device ${esc(f.device.slice(0,10))}… · ${esc(f.detail)} · ${fmtTime(f.at)}</div>`).join('');
  } else {
    flagsHtml = '<div class="muted">Подозрительных паттернов не найдено.</div>';
  }

  document.getElementById('out').innerHTML = `
    <div class="grid">
      <div class="card"><h3>Всего сканов</h3><div class="big">${d.total}</div></div>
      <div class="card"><h3>Уникальных устройств</h3><div class="big">${d.uniqueDevices}</div></div>
    </div>
    <div class="card"><h3>По инструменту</h3>${rows(d.byTool)}</div>
    <div class="card"><h3>По экрану</h3>${rows(d.byScreen)}</div>
    <div class="card"><h3>По метке src (МП/регион)</h3>${rows(d.bySrc)}</div>
    <div class="card"><h3>Флаги подозрительной активности</h3>${flagsHtml}</div>
    <div class="card"><h3>Последние 50 событий</h3><pre>${d.recent.map(r=>`${fmtTime(r.ts)} · ${r.tool}/${r.screen} · src=${r.src||'—'} · dev=${r.device.slice(0,10)}…`).join('\n')}</pre></div>
  `;
}

(function(){
  const saved = localStorage.getItem('farmak_stats_key');
  if(saved){ document.getElementById('key').value = saved; load(); }
})();
</script>
</body>
</html>
